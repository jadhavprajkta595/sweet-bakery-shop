<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Now</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="order-wrapper">
    <h2>Order Details</h2>

    <form class="order-form">
         <label>Product</label>
        <input type="text" id="productName" readonly>
        <label>Price (₹)</label>
        <input type="number" id="price" readonly>
        <label>Quantity</label>
        <input type="number" id="quantity" min="1" value="1" onchange="calculateTotal()">
        <label>Total Price (₹)</label>
        <input type="number" id="total" readonly>
        <label>Delivery Date</label>
        <input type="date">
 <label>Payment Method</label>
        <select>
            <option>Cash on Delivery</option>
            <option>UPI</option>
            <option>Debit / Credit Card</option>
        </select>

        <button type="submit">Confirm Order</button>
    </form>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const product = params.get('product');
const price = params.get('price');


document.getElementById('productName').value = product || '';
document.getElementById('price').value = price || '';


function calculateTotal(){
    const qty = document.getElementById('quantity').value;
    document.getElementById('total').value = price * qty;
}
calculateTotal();
</script>
<div class="center-link">
    <a href="about us.html">If you want more information, click on about us</a>
</div>

</body>
</html>
